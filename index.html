<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniGame Hub</title>
  <link rel="stylesheet" href="launcher.css" />
</head>
<body>
  <main class="hub-page">
    <div class="hub-bg"></div>

    <section class="hub-card">
      <div class="hub-logo">MG</div>
      <h1 class="hub-title">MiniGame Hub</h1>
      <p class="hub-subtitle">
        실행할 게임을 선택하세요
      </p>

      <div class="game-grid">
        <a class="game-tile" href="./GamePartShare/index.html">
          <div class="game-icon">🎲</div>
          <div class="game-name">분배게임</div>
          <div class="game-desc">텍스트를 랜덤 분배하는 게임</div>
        </a>

        <button class="game-tile disabled" type="button">
          <div class="game-icon">🧩</div>
          <div class="game-name">준비중</div>
          <div class="game-desc">다음 게임이 들어올 자리</div>
        </button>

        <button class="game-tile disabled" type="button">
          <div class="game-icon">🎯</div>
          <div class="game-name">준비중</div>
          <div class="game-desc">다음 게임이 들어올 자리</div>
        </button>

        <button class="game-tile disabled" type="button">
          <div class="game-icon">🃏</div>
          <div class="game-name">준비중</div>
          <div class="game-desc">다음 게임이 들어올 자리</div>
        </button>
      </div>
    </section>
  </main>
</body>
</html>
