
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniGame Room</title>
  <link rel="stylesheet" href="room.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="left-panel">
      <div class="brand-card">
        <div class="brand-logo">MG</div>
        <div>
          <div class="brand-name">MiniGame</div>
          <div class="brand-desc">Secret Room</div>
        </div>
      </div>

      <div class="code-card">
        <div class="card-title">초대코드</div>
        <div class="code-row">
          <span id="roomCodeText" class="code-text">------</span>
          <button id="copyCodeBtn" class="small-btn">복사</button>
        </div>
      </div>

      <div class="info-card">
        <div class="card-title">방 정보</div>
        <div class="info-row"><span>내 닉네임</span><strong id="myNickname">-</strong></div>
        <div class="info-row"><span>방장</span><strong id="gmNickname">-</strong></div>
        <div class="info-row"><span>상태</span><strong id="roomStatus">-</strong></div>
      </div>

      <div id="gmPanel" class="gm-card hidden">
        <div class="card-title">방장 메뉴</div>
        <div class="gm-actions">
          <button id="startBtn" class="main-btn blue">시작하기</button>
          <button id="transferBtn" class="main-btn gray">방장 양도하기</button>
          <button id="revealBtn" class="main-btn gray">전체 공개</button>
          <button id="newGameBtn" class="main-btn gray">새 게임</button>
          <button id="destroyBtn" class="main-btn red">방 폭파</button>
        </div>
      </div>
    </aside>

    <main class="main-panel">
      <header class="top-header">
        <div>
          <h1 class="page-title">게임 방</h1>
          <p class="page-subtitle">텍스트를 함께 작성하고 랜덤으로 배정받으세요.</p>
        </div>
      </header>

      <section class="grid-wrap">
        <section class="panel participants-panel">
          <div class="panel-head">
            <h2>참가자</h2>
            <span id="participantCount" class="pill">0명</span>
          </div>
          <ul id="participantsList" class="participants-list"></ul>
        </section>

        <section class="panel text-panel">
          <div class="panel-head">
            <h2>텍스트 목록</h2>
            <span class="panel-tip">한 줄에 하나씩</span>
          </div>

          <textarea id="textListInput" class="text-area" placeholder="예:
술래
술래아님
술래아님"></textarea>

          <div class="text-actions">
            <button id="saveTextsBtn" class="main-btn blue">텍스트 저장</button>
            <span id="textCountLabel" class="text-count">0개 저장됨</span>
          </div>

          <div class="saved-list-wrap">
            <div class="saved-title">현재 저장된 텍스트</div>
            <ul id="savedTextsList" class="saved-texts-list"></ul>
          </div>
        </section>

        <section class="panel my-panel">
          <div class="panel-head">
            <h2>내 텍스트</h2>
            <span id="myRevealState" class="panel-tip">아직 확인 안 함</span>
          </div>

          <div id="myTextBox" class="my-text-box">아직 시작되지 않았습니다.</div>

          <div class="my-actions">
            <button id="viewMineBtn" class="main-btn blue">내 텍스트 보기</button>
          </div>
        </section>

        <section class="panel result-panel">
          <div class="panel-head">
            <h2>전체 공개 결과</h2>
            <span id="revealBadge" class="pill gray">비공개</span>
          </div>
          <ul id="revealList" class="reveal-list"></ul>
        </section>
      </section>
    </main>
  </div>

  <script type="module" src="room.js"></script>
</body>
</html>
