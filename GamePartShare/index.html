<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniGame</title>
  <link rel="stylesheet" href="landing.css" />
</head>
<body>
  <main class="landing-page">
    <div class="landing-bg"></div>

    <section class="landing-card">
      <div class="logo-wrap">
        <div class="logo-box">MG</div>
      </div>

      <h1 class="landing-title">MiniGame</h1>
      <p class="landing-subtitle">
        초대코드로 방에 들어와<br />
        텍스트를 함께 작성하고 랜덤으로 배정받는 미니게임
      </p>

      <div class="landing-actions">
        <button id="goCreate" class="action-btn primary">새 방 만들기</button>
        <button id="goJoin" class="action-btn secondary">기존 방 참여하기</button>
      </div>
    </section>
  </main>

  <script type="module" src="landing.js"></script>
</body>
</html>
