<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>숲글:숲갈래글 (알파테스트:0.0.6)</title>
    <link rel="stylesheet" href="./css/phase2_best_rankings_view.css?v=0.0.16" />
    <link rel="stylesheet" href="./css/home_app_shell.css?v=0.0.18" />
  </head>
  <body data-shell-page="paidBest" data-shell-right="home">
    <div data-shell-content>
        <section class="best-head" aria-labelledby="bestTitle">
          <p>BEST RANKING</p>
          <h1 id="bestTitle">베스트</h1>
          <span id="bestDescription">작품 제목을 누르면 작품홈으로 이동합니다.</span>
        </section>

        <nav class="best-tabs" aria-label="베스트 메뉴">
          <button type="button" data-best-period="monthly">월간<span class="tab-extra"> 베스트</span></button>
          <button type="button" data-best-period="weekly">주간<span class="tab-extra"> 베스트</span></button>
          <button type="button" data-best-period="daily">일일<span class="tab-extra"> 베스트</span></button>
          <button type="button" data-best-period="new">신작<span class="tab-extra"> 베스트</span></button>
        </nav>

        <section class="best-top-strip" aria-labelledby="bestTopTitle">
          <div class="section-head">
            <h2 id="bestTopTitle">TOP 3</h2>
          </div>
          <div class="best-cover-grid" id="bestCoverGrid"></div>
        </section>

        <section class="ranking-list" id="rankingList" aria-label="베스트 작품 목록"></section>
        <button class="load-more-rankings hidden" type="button" id="loadMoreRankings">더보기</button>
    </div>

    <script type="module" src="./js/home_app_shell.js?v=0.0.18"></script>
    <script type="module" src="./js/phase2_best_rankings_app.js?v=0.0.17"></script>
  </body>
</html>
