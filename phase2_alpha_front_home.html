<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>숲글:숲갈래글 (알파테스트:0.0.6)</title>
    <link rel="stylesheet" href="./css/phase2_alpha_front_home_view.css?v=0.0.20" />
    <link rel="stylesheet" href="./css/home_app_shell.css?v=0.0.21" />
  </head>
  <body data-shell-page="home" data-shell-right="home">
    <div data-shell-content>
      <nav class="main-menu-tabs" aria-label="홈 분류">
        <button class="menu-tab-item active" type="button" data-filter="all">전체</button>
        <button class="menu-tab-item" type="button" data-filter="updated">최근 갱신</button>
        <button class="menu-tab-item" type="button" data-filter="interactive">갈래글</button>
        <button class="menu-tab-item" type="button" data-filter="general">일반글</button>
        <span class="tab-spacer"></span>
        <button class="menu-tab-item genre-filter" type="button" data-empty-action="장르필터">장르필터</button>
      </nav>

      <section class="notice-line" aria-label="알파테스트 안내">
        <button type="button" data-empty-action="테스트 공지">
          결제 루틴은 아직 연결하지 않고, 사이트 내부 가상 숲결만 사용합니다.
        </button>
      </section>

      <section class="help-bridge" aria-label="도움말 바로가기">
        <a href="./site_help_guides.html">
          <strong>처음 오셨다면 도움말 가이드</strong>
          <span>작가/독자 사용법을 제목별로 읽고 500숲결씩 받기</span>
          <b>바로가기</b>
        </a>
      </section>

      <section class="recommend-strip" aria-labelledby="recommendTitle">
        <div class="section-head">
          <h1 id="recommendTitle">지금 추천 작품</h1>
          <span>광고 슬롯</span>
        </div>
        <div class="recommend-scroll" id="recommendList"></div>
      </section>

      <section class="work-feed" aria-labelledby="workFeedTitle">
        <div class="section-head">
          <h2 id="workFeedTitle">지금 읽을 작품</h2>
          <span id="filterLabel">전체 목록</span>
        </div>
        <div class="work-list" id="workList"></div>
      </section>
    </div>

    <script type="module" src="./js/home_app_shell.js?v=0.0.21"></script>
    <script type="module" src="./js/phase2_alpha_front_home_app.js?v=0.0.21"></script>
  </body>
</html>
