<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>숲글:숲갈래글 (알파테스트:0.0.6)</title>
    <link rel="stylesheet" href="./css/phase2_alpha_front_home_view.css" />
    <link rel="stylesheet" href="./css/home_app_shell.css" />
  </head>
  <body data-shell-page="home" data-shell-right="home">
    <div data-shell-content>
      <nav class="main-menu-tabs" aria-label="홈 분류">
        <button class="menu-tab-item active" type="button" data-filter="all">전체</button>
        <button class="menu-tab-item" type="button" data-filter="updated">최근 갱신</button>
        <button class="menu-tab-item" type="button" data-filter="interactive">갈래글</button>
        <button class="menu-tab-item" type="button" data-filter="general">일반글</button>
        <span class="tab-spacer"></span>
        <button class="menu-tab-item genre-filter" type="button" data-empty-action="장르필터">장르필터</button>
      </nav>

      <section class="notice-line" aria-label="알파테스트 안내">
        <button type="button" data-empty-action="테스트 공지">
          결제 루틴은 아직 연결하지 않고, 사이트 내부 가상 골드만 사용합니다.
        </button>
      </section>

      <section class="best-strip" aria-labelledby="bestTitle">
        <div class="section-head">
          <h1 id="bestTitle">유료 베스트</h1>
          <a href="./phase2_best_rankings.html?tab=paid">더보기</a>
        </div>
        <div class="cover-rank-grid" id="paidBestGrid"></div>
      </section>

      <section class="work-feed" aria-labelledby="workFeedTitle">
        <div class="section-head">
          <h2 id="workFeedTitle">지금 읽을 작품</h2>
          <span id="filterLabel">전체 목록</span>
        </div>
        <div class="work-list" id="workList"></div>
      </section>
    </div>

    <script type="module" src="./js/home_app_shell.js"></script>
    <script type="module" src="./js/phase2_alpha_front_home_app.js"></script>
  </body>
</html>
